<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador IA - TensorFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { background: #1e293b; width: 100%; padding: 15px 0; display: flex; justify-content: center; border-bottom: 2px solid #334155; box-sizing: border-box; }
        .painel-topo { display: flex; justify-content: space-between; align-items: center; width: 640px; }
        .contador-display { background: #000; border: 2px solid #38bdf8; padding: 10px 25px; border-radius: 8px; font-size: 32px; font-weight: bold; color: #38bdf8; }
        .video-wrapper { position: relative; width: 640px; height: 480px; background: #000; border-radius: 8px; overflow: hidden; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.9); display:flex; justify-content:center; align-items:center; z-index: 9999; font-size: 20px; flex-direction: column; gap: 20px; text-align: center; }
        .spinner { border: 6px solid #334155; border-top: 6px solid #38bdf8; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .controles { margin-top: 20px; width: 640px; background: #1e293b; padding: 20px; border-radius: 8px; box-sizing: border-box; }
        .dica { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="status">A carregar IA do Google (TensorFlow)...<br><small>Isso pode levar alguns segundos na primeira vez.</small></div>
    </div>

    <div class="header">
        <div class="painel-topo">
            <h2>Contador de Esteira (IA)</h2>
            <div class="contador-display">PEÇAS: <span id="contadorVal">0</span></div>
        </div>
    </div>

    <div class="video-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvasSaida" width="640" height="480"></canvas>
    </div>

    <div class="controles">
        <div class="dica">
            <strong>Como funciona agora:</strong><br>
            A Inteligência Artificial reconhece a forma de objetos sólidos. Não importa a cor da esteira, reflexos de luz ou manchas.
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="zerarContador()" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">Zerar Contador</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvasSaida = document.getElementById('canvasSaida');
        const ctxSaida = canvasSaida.getContext('2d');
        
        let modeloIA = null;
        let contador = 0;
        const LINHA_X = 320; // Linha bem no meio da tela

        // Sistema de rastreamento de IDs
        let rastreadoresAtivos = [];
        let proximoID = 1;
        const MAX_DISTANCIA_TRACKING = 150; // Quão longe a peça pode andar por frame
        const MAX_FRAMES_INVISIVEL = 10;    // Memória caso a IA pisque

        async function iniciarApp() {
            try {
                document.getElementById('status').innerHTML = "A pedir acesso à câmara...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 480 }
                });
                video.srcObject = stream;

                video.onloadeddata = async () => {
                    document.getElementById('status').innerHTML = "Câmara pronta. A carregar o Cérebro da IA...<br><small>(Fazendo download do modelo de visão)</small>";
                    
                    // Carrega o modelo pré-treinado do Google
                    modeloIA = await cocoSsd.load();
                    
                    document.getElementById('loading').style.display = 'none';
                    detectarFrame(); // Inicia o loop da IA
                };
            } catch (err) {
                alert("Erro ao aceder à câmara. Tente via HTTPS ou Localhost.");
                console.error(err);
            }
        }

        function detectarFrame() {
            // A IA analisa o frame do vídeo e devolve as caixas prontas!
            modeloIA.detect(video).then(predictions => {
                
                ctxSaida.clearRect(0, 0, canvasSaida.width, canvasSaida.height);
                desenharLinha(LINHA_X, '#ef4444'); // Linha Vermelha de espera

                let deteccoesTratadas = [];

                // Para cada objeto que a IA encontrou na tela...
                predictions.forEach(prediction => {
                    // O TensorFlow retorna [x, y, largura, altura]
                    let [x, y, width, height] = prediction.bbox;
                    let centroX = x + (width / 2);
                    let centroY = y + (height / 2);

                    // Ignorar coisas microscópicas (ruído)
                    if (width > 30 && height > 30) {
                        deteccoesTratadas.push({
                            x: x, y: y, w: width, h: height,
                            cx: centroX, cy: centroY,
                            classe: prediction.class // O que a IA acha que é (ex: "cell phone", "bottle")
                        });
                    }
                });

                atualizarRastreadores(deteccoesTratadas);

                // Pede o próximo frame
                requestAnimationFrame(detectarFrame);
            });
        }

        function atualizarRastreadores(deteccoes) {
            let rastreadoresAtualizados = [];

            for (let det of deteccoes) {
                let melhorMatchIndex = -1;
                let menorDistancia = MAX_DISTANCIA_TRACKING;

                for (let i = 0; i < rastreadoresAtivos.length; i++) {
                    let rast = rastreadoresAtivos[i];
                    let dist = Math.hypot(rast.cx - det.cx, rast.cy - det.cy);
                    if (dist < menorDistancia) {
                        menorDistancia = dist;
                        melhorMatchIndex = i;
                    }
                }

                if (melhorMatchIndex !== -1) {
                    let rast = rastreadoresAtivos[melhorMatchIndex];
                    rast.cxAnterior = rast.cx; 
                    rast.cx = det.cx;          
                    rast.cy = det.cy;
                    rast.caixa = det;
                    rast.framesInvisivel = 0;
                    rastreadoresAtualizados.push(rast);
                    rastreadoresAtivos.splice(melhorMatchIndex, 1); 
                } else {
                    rastreadoresAtualizados.push({
                        id: proximoID++,
                        cxAnterior: det.cx,
                        cx: det.cx,
                        cy: det.cy,
                        caixa: det,
                        framesInvisivel: 0,
                        contada: false
                    });
                }
            }

            for (let rast of rastreadoresAtivos) {
                rast.framesInvisivel++;
                if (rast.framesInvisivel < MAX_FRAMES_INVISIVEL) {
                    rastreadoresAtualizados.push(rast);
                }
            }

            rastreadoresAtivos = rastreadoresAtualizados;

            let cruzouAgora = false;

            for (let rast of rastreadoresAtivos) {
                if (rast.framesInvisivel === 0) {
                    // Desenha a caixa (Verde se já contou, Azul claro se não)
                    let corCaixa = rast.contada ? '#22c55e' : '#38bdf8';
                    ctxSaida.strokeStyle = corCaixa;
                    ctxSaida.lineWidth = 4;
                    ctxSaida.strokeRect(rast.caixa.x, rast.caixa.y, rast.caixa.w, rast.caixa.h);
                    
                    ctxSaida.fillStyle = corCaixa;
                    ctxSaida.font = '16px sans-serif';
                    ctxSaida.fillText(`ID:${rast.id} (${rast.caixa.classe})`, rast.caixa.x, rast.caixa.y - 8);
                }

                // Gatilho Bi-direcional
                let cruzouDaEsquerda = (rast.cxAnterior < LINHA_X && rast.cx >= LINHA_X);
                let cruzouDaDireita = (rast.cxAnterior > LINHA_X && rast.cx <= LINHA_X);

                if (!rast.contada && (cruzouDaEsquerda || cruzouDaDireita)) {
                    contador++;
                    document.getElementById('contadorVal').innerText = contador;
                    rast.contada = true;
                    cruzouAgora = true;
                }
            }

            if (cruzouAgora) {
                desenharLinha(LINHA_X, '#ffffff', 8); 
            }
        }

        function desenharLinha(x, cor, grossura = 3) {
            ctxSaida.beginPath();
            ctxSaida.moveTo(x, 0);
            ctxSaida.lineTo(x, canvasSaida.height);
            ctxSaida.strokeStyle = cor;
            ctxSaida.lineWidth = grossura;
            ctxSaida.stroke();
        }

        function zerarContador() {
            contador = 0;
            document.getElementById('contadorVal').innerText = contador;
            proximoID = 1;
            rastreadoresAtivos = [];
        }

        // Inicia a aplicação quando a página carrega
        window.addEventListener('load', iniciarApp);
    </script>
</body>
</html>
